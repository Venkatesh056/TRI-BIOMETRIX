<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Biometric Security System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --dark-bg: #1e293b;
        }
        body {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .btn-primary {
            background: var(--primary-color);
            border: none;
            padding: 12px 28px;
            font-size: 1.1rem;
            border-radius: 10px;
        }
        .btn-success { background: var(--success-color); border: none; }
        .btn-danger { background: var(--danger-color); border: none; }
        .form-control, .form-select {
            padding: 14px 18px;
            font-size: 1.1rem;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }
        .video-container {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        .video-container video, .video-container canvas {
            width: 100%;
            border-radius: 12px;
        }
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .status-success { background: #d1fae5; color: #065f46; }
        .status-error { background: #fee2e2; color: #991b1b; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .icon-large { font-size: 2.5rem; }
        .nav-link { font-size: 1.1rem; padding: 12px 20px !important; }
        h1, h2, h3 { font-weight: 700; }
        .capture-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .capture-grid img { width: 100%; border-radius: 8px; border: 2px solid #e2e8f0; }
        .audio-item { background: #f1f5f9; padding: 12px; border-radius: 8px; margin-bottom: 8px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: rgba(0,0,0,0.3);">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-shield-alt me-2"></i>Biometric Security</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/"><i class="fas fa-lock me-1"></i>Authenticate</a>
                <a class="nav-link" href="/enrollment"><i class="fas fa-user-plus me-1"></i>Enroll</a>
                <a class="nav-link" href="/admin"><i class="fas fa-cog me-1"></i>Admin</a>
            </div>
        </div>
    </nav>
    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
